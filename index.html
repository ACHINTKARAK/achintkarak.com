<!doctype html>
<html lang="en" data-theme="light">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Achint Karak — Photo Journal</title>
  <meta name="description" content="A long-term, quiet photo journal by Achint Karak." />
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <main class="wrap home">
  
	<div class="settings">
		<button class="gear" type="button" aria-label="Settings">⚙</button>
		
		<div class="menu" aria-label="Settings menu">
			<button class="menu-item" id="themeToggle" type="button">Theme</button>
		</div>
	</div>
	
    <header class="meta">
      <h1 class="site-title">Achint Karak</h1>
      <p class="tagline">Moments that didn’t ask to be photographed. A quiet photo journal.</p>
    </header>

	<section class="latest">
		<div class="kicker">Latest Albums</div>
	
		<div class="latest-stack">
			<a class="latest-item" href="/journal/2026-02/malta/">
			Malta
			</a>
			<a class="latest-item" href="/journal/2026-01/tenerife-spain/">
			Tenerife Spain
			</a>
			<a class="latest-item" href="/journal/2025-12/dingle-ireland/">
			Dingle Ireland
			</a>
		</div>
	</section>

	<section class="browse">
	<div class="browse-title">Browse More</div>
	
	
	
	
		<div class="year">
			<button class="year-btn" type="button" data-year="2026" aria-expanded="false">
			2026
			<span class="chev" aria-hidden="true">▾</span>
			</button>
	
			<div class="year-panel" id="year-2026" hidden>
			<div class="months">
	
		<a class="month-link" href="/journal/2026-02/">February 2026</a>
	
	
	
		<a class="month-link" href="/journal/2026-01/">January 2026</a>
	
	
			</div>
			</div>
	
		<div class="year">
			<button class="year-btn" type="button" data-year="2025" aria-expanded="false">
			2025
			<span class="chev" aria-hidden="true">▾</span>
			</button>
	
			<div class="year-panel" id="year-2025" hidden>
			<div class="months">
	
		<a class="month-link" href="/journal/2025-12/">December 2025</a>
	
			</div>
			</div>
		</div>
	</section>

    <footer class="copyright">
      © Achint Karak. All photographs are copyrighted.
      <a href="/about/">About</a>
    </footer>
  </main>

	<script>
	(function () {
		const KEY = "ak_theme";
		const html = document.documentElement;
		const btn = document.getElementById("themeToggle");
	
		function apply(theme){
		html.setAttribute("data-theme", theme);
		try { localStorage.setItem(KEY, theme); } catch(e) {}
		}
	
		// Load saved theme (default light)
		let theme = "light";
		try {
		const saved = localStorage.getItem(KEY);
		if (saved === "dark" || saved === "light") theme = saved;
		} catch(e) {}
	
		apply(theme);
	
		if (btn) btn.addEventListener("click", function(){
		const current = html.getAttribute("data-theme") || "light";
		apply(current === "dark" ? "light" : "dark");
		});
	})();
	</script>
	<script>
	(function(){
		document.addEventListener("click", function(e){
		const btn = e.target.closest(".year-btn");
		if (!btn) return;
	
		const year = btn.getAttribute("data-year");
		const panel = document.getElementById("year-" + year);
		if (!panel) return;
	
		const isOpen = btn.getAttribute("aria-expanded") === "true";
	
		// close all
		document.querySelectorAll(".year-btn").forEach(b => b.setAttribute("aria-expanded", "false"));
		document.querySelectorAll(".year-panel").forEach(p => p.hidden = true);
	
		// open clicked if it was closed
		if (!isOpen){
			btn.setAttribute("aria-expanded", "true");
			panel.hidden = false;
		}
		});
	})();
	</script>
</body>
</html>
