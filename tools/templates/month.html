<!doctype html>
<html lang="en" data-theme="light">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>{{ month.title }} — Achint Karak</title>
  <meta name="description" content="Index for {{ month.title }} — Achint Karak’s photo journal." />
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <main class="wrap month-page">

    <div class="settings">
      <button
        class="gear"
        id="settingsToggle"
        type="button"
        aria-label="Settings"
        aria-expanded="false"
        aria-controls="settingsMenu"
      >⚙</button>

      <div class="menu" id="settingsMenu" aria-label="Settings menu" hidden>
        <button class="menu-item" id="themeToggle" type="button">Light</button>
        <a class="menu-item" href="/about/">About</a>
      </div>
    </div>

    <nav class="crumbs">
      <a href="/">Home</a>
      <span class="sep">/</span>
      <span class="current">{{ month.title }}</span>
    </nav>

    <header class="meta">
      <div class="date">{{ month.title }}</div>
    </header>

    <nav class="index">
      {% for a in month.albums %}
        <a href="/journal/{{ month.id }}/{{ a.slug }}/">{{ a.title }}</a>
      {% endfor %}
    </nav>

    <div class="pills" style="margin-top: 10px;">
      <a class="btn" href="/">Home</a>
    </div>

    <footer class="footer">
      © Achint Karak — Photo Journal
    </footer>
  </main>

  <script>
    (function () {
      const THEME_KEY = "ak_theme";
      const html = document.documentElement;
      const themeBtn = document.getElementById("themeToggle");
      const settingsToggle = document.getElementById("settingsToggle");
      const settingsMenu = document.getElementById("settingsMenu");

      function updateThemeButton(theme) {
        if (themeBtn) {
          themeBtn.textContent = theme === "dark" ? "Light" : "Dark";
        }
      }

      function applyTheme(theme) {
        html.setAttribute("data-theme", theme);
        updateThemeButton(theme);
        try {
          localStorage.setItem(THEME_KEY, theme);
        } catch (e) {}
      }

      let theme = "light";
      try {
        const saved = localStorage.getItem(THEME_KEY);
        if (saved === "dark" || saved === "light") theme = saved;
      } catch (e) {}

      applyTheme(theme);

      if (themeBtn) {
        themeBtn.addEventListener("click", function (e) {
          e.stopPropagation();
          const current = html.getAttribute("data-theme") || "light";
          applyTheme(current === "dark" ? "light" : "dark");
        });
      }

      function openMenu() {
        if (!settingsMenu || !settingsToggle) return;
        settingsMenu.hidden = false;
        settingsToggle.setAttribute("aria-expanded", "true");
      }

      function closeMenu() {
        if (!settingsMenu || !settingsToggle) return;
        settingsMenu.hidden = true;
        settingsToggle.setAttribute("aria-expanded", "false");
      }

      function toggleMenu() {
        if (!settingsMenu) return;
        if (settingsMenu.hidden) openMenu();
        else closeMenu();
      }

      if (settingsToggle) {
        settingsToggle.addEventListener("click", function (e) {
          e.stopPropagation();
          toggleMenu();
        });
      }

      if (settingsMenu) {
        settingsMenu.addEventListener("click", function (e) {
          e.stopPropagation();
        });
      }

      document.addEventListener("click", function (e) {
        if (
          settingsMenu &&
          settingsToggle &&
          !settingsMenu.hidden &&
          !e.target.closest(".settings")
        ) {
          closeMenu();
        }
      });

      document.addEventListener("keydown", function (e) {
        if (e.key === "Escape") {
          closeMenu();
        }
      });
    })();
  </script>
</body>
</html>
