<!doctype html>
<html lang="en" data-theme="light">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>{{ month.title }} — Achint Karak</title>
  <meta name="description" content="Index for {{ month.title }} — Achint Karak’s photo journal." />
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <main class="wrap">
  
	<div class="settings">
		<button class="gear" type="button" aria-label="Settings">⚙</button>
		
		<div class="menu" aria-label="Settings menu">
			<button class="menu-item" id="themeToggle" type="button">Theme</button>
		</div>
	</div>

    <nav class="crumbs">
      <a href="/">Home</a>
      <span class="sep">/</span>
      <span class="current">{{ month.title }}</span>
    </nav>

    <header class="meta">
      <div class="date">{{ month.title }}</div>
    </header>

    <nav class="index">
      {% for a in month.albums %}
        <a href="/journal/{{ month.id }}/{{ a.slug }}/">{{ a.title }}</a>
      {% endfor %}
    </nav>

    <div class="pills" style="margin-top: 10px;">
      <a class="btn" href="/">Home</a>
    </div>

    <footer class="footer">
      © Achint Karak. All photographs are copyrighted.
    </footer>
  </main>

  <script>
    (function () {
      const KEY = "ak_theme";
      const html = document.documentElement;
      const btn = document.getElementById("themeToggle");

      function apply(theme){
        html.setAttribute("data-theme", theme);
        try { localStorage.setItem(KEY, theme); } catch(e) {}
      }

      let theme = "light";
      try {
        const saved = localStorage.getItem(KEY);
        if (saved === "dark" || saved === "light") theme = saved;
      } catch(e) {}

      apply(theme);

	  if (btn) btn.addEventListener("click", function(){
        const current = html.getAttribute("data-theme") || "light";
        apply(current === "dark" ? "light" : "dark");
      });
    })();
  </script>
</body>
</html>
